<html>

<head>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script> <!-- Using A-frame version 1.5.0 -->
	<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
	<!-- Start of a-scene, A-Frame uses right-hand coordinates -->
	<!-- For more information: https://aframe.io/docs/1.5.0/guides/building-a-basic-scene.html#transforming-an-entity-in-3d -->
	<a-scene mindar-image="imageTargetSrc: ./imageTargets/card.mind;" color-space="sRGB"
		renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
		device-orientation-permission-ui="enabled: false">

		<!-- Asset management system -->
		<!-- For more information: https://aframe.io/docs/1.5.0/core/asset-management-system.html -->
		<a-assets>

			<img id="card" src="./images/card.png" />
			<a-asset-item id="avatarModel" src="./models/HelloHolo.gltf"></a-asset-item>

		</a-assets>

		<!-- Camera settings -->
		<a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: ${customFields.libVersion}; objects: .clickable"></a-camera>

	
		<!-- Place your A-Frame Primitives below -->
		<a-entity mindar-image-target="targetIndex: 0">

			<!-- Display the image of the card onto a primitive plane -->
			<a-plane src="#card" position="0 0 0" height="1" width="0.552" rotation="0 0 90"></a-plane>

			<!-- Find out more about TEXT via https://aframe.io/docs/1.5.0/primitives/a-text.html -->
			<a-text text="value: Your name" align="left" position="-0.45 0.2 0" width="1"></a-text>
			<a-text text="value: Your title" align="left" position="-0.45 0.15 0" width="1"></a-text>

			<a-text 
				text="value: Contact Me; align: center; width: 1" 
    			geometry="primitive: plane; width: 0.25; height: 0.1;" 
    			material="color: black; opacity: 0.5" 
    			position="0.35 -0.2 0.01" 
    			class="clickable"
    			link="href: mailto: youremail@domain.com">>	
			</a-text>

			<a-text 
				text="value: Click here for my portfolio; align: center; width: 1" 
    			geometry="primitive: plane; width: 0.6; height: 0.1;" 
    			material="color: black; opacity: 0.5" 
    			position="0 -0.33 0.01" 
    			class="clickable"
    			link="href: https://helloholo.sg/">>	
			</a-text>
			
			
			
			<!-- Find out more about GLTF Models via https://aframe.io/docs/1.5.0/components/gltf-model.html -->
			<a-gltf-model src="#avatarModel" rotation="0 0 0 " position="-0.1 0.45 0.1" scale="0.001 0.001 0.001"
				animation="property: position; to: 0.1 0.45 0.1; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate">

		</a-entity>
	</a-scene>
</body>

</html>
