<html>

<head>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script> <!-- Using A-frame version 1.5.0 -->
	<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

	<!-- A-Frame Hologram Shader by TravisBarryDick https://github.com/TravisBarryDick/aframe-hologram-shader -->
	<script src="https://unpkg.com/aframe-hologram-shader"></script>
	<!-- Plane-based shader effects (used by the card primitives below) -->
	<script src="./effects/holo-shimmer.js"></script>
	<script src="./effects/card-glow.js"></script>
	<script src="./effects/shader-time.js"></script>
	<script src="./effects/halo-rings.js"></script>
	<script src="./effects/matrix-stream.js"></script>

	<!-- Avatar mesh-effect components: mix-and-match per mesh node.
	     Each effect is its own standalone file in /components/.
	     Available effects: effect-glow, effect-matrix, effect-rings, effect-glitch
	     Configure on a-gltf-model with `part: "MeshA, MeshB"`. -->
	<script src="./components/avatar-effect-utils.js"></script>
	<script src="./components/effect-glow.js"></script>
	<script src="./components/effect-matrix.js"></script>
	<script src="./components/effect-rings.js"></script>
	<script src="./components/effect-glitch.js"></script>

	<!-- Simple Javascript function to open url in a new tab -->
	<script>
		AFRAME.registerComponent('navigate-on-click', {
			schema: {
				url: { type: 'string', default: '' }
			},

			init: function () {
				var data = this.data;
				var el = this.el;

				el.addEventListener('click', function () {
					window.open(data.url, '_blank');
				});
			}
		});
	</script>
</head>

<body>
	<!-- Start of a-scene, A-Frame uses right-hand coordinates -->
	<!-- For more information: https://aframe.io/docs/1.5.0/guides/building-a-basic-scene.html#transforming-an-entity-in-3d -->
	<a-scene mindar-image="imageTargetSrc: ./imageTargets/card.mind;" color-space="sRGB"
		renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
		device-orientation-permission-ui="enabled: false">

		<!-- Asset management system -->
		<!-- For more information: https://aframe.io/docs/1.5.0/core/asset-management-system.html -->
		<a-assets>
			<img id="card" src="./images/card.png">
			<a-asset-item id="avatarModel" src="./models/MyAvatar.glb"></a-asset-item>
		</a-assets>

		<!-- Camera settings -->
		<a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"
			raycaster="far: ${customFields.libVersion}; objects: .clickable"></a-camera>

		<!-- Place your A-Frame Primitives below -->
		<a-entity mindar-image-target="targetIndex: 0">
			<!-- Card Glow Effect -->
			<!-- <a-plane position="0 0 -0.02" height="2" width="1.2" rotation="0 0 90"
				material="shader: card-glow; color: #00e5ff; intensity: 1.35; transparent: true; depthWrite: false; blending: additive;">
			</a-plane> -->

			<!-- Halo Rings Effect -->
			<!-- <a-plane position="0 0 -0.1" height="2.2" width="2.2" rotation="0 0 90" shader-time
				material="shader: halo-rings; color: #00e5ff; intensity: 0.9; transparent: true; depthWrite: false; blending: additive;">
			</a-plane> -->

			<!-- Matrix Stream Effect -->
			<!-- <a-plane position="0 0 0.015" height="0.552" width="1" matrix-stream="color: #63ff9d; intensity: 0.85;"></a-plane> -->

			<!--
				Display the image of the card onto a primitive plane
				Glitch effect is configured via material properties
			-->
			<!-- <a-plane
				src="#card"
				position="0 0 0" height="1" width="0.552" rotation="0 0 90"
				material="shader: hologram; glitchBarDrift: 0.05; rgbSeparation: 0.5; glitchRate: 1;"
			>
			</a-plane> -->

			<!-- <a-plane src="#card" position="0 -0.7 0" height="1" width="0.552" rotation="0 0 90"
				material="shader: holo-shimmer; shimmerIntensity: 0.2; foilBrightness: 0.5; tiling: 2; transparent: true;">
			</a-plane> -->

			<!-- Find out more about TEXT via https://aframe.io/docs/1.5.0/primitives/a-text.html -->
			<a-text text="value: Your name" align="left" position="-0.45 0.2 0" width="1"></a-text>
			<a-text text="value: Your title" align="left" position="-0.45 0.15 0" width="1"></a-text>

			<!-- Clickable text using HTML href attribute -->
			<a-text text="value: Contact Me; align: center; width: 1"
				geometry="primitive: plane; width: 0.25; height: 0.1;" material="color: gray; opacity: 1"
				position="0.35 -0.2 0.01" class="clickable" link="href: mailto: youremail@domain.com">
			</a-text>

			<!--- Clickable text using our Javascript Function -->
			<a-text text="value: Click here for my portfolio; align: center; width: 1"
				geometry="primitive: plane; width: 0.6; height: 0.1;" material="color: gray; opacity: 0.5"
				position="0 -0.33 0.01" class="clickable" navigate-on-click="url: https://www.helloholo.sg">
			</a-text>

			<!-- Find out more about GLTF Models via https://aframe.io/docs/1.5.0/components/gltf-model.html
			     Avatar effects: mix-and-match per mesh node. Available meshes:
			       Brows, Eyes, FemaleBody, Hair, Head, Hoodie, Pants
			     Available effects (see /components/): effect-glow, effect-matrix,
			       effect-rings, effect-glitch
			     Use `__id` suffixes (e.g. effect-glow__crown) to stack multiple
			     instances of the same effect with different colors per mesh. -->
			<a-gltf-model id="avatarModel" src="#avatarModel" rotation="0 0 0" position="-0.1 -0.5 0.1"
				scale="0.1 0.1 0.1" effect-glow="part: Hoodie; color: #00e5ff; intensity: 2.5"
				effect-matrix="part: Pants; color: #63ff9d" effect-rings="part: Hair; color: #ff66ff"
				effect-glitch="part: Eyes; color: #ff3aa3; glitchRate: 1.2"
				animation="property: position; to: 0.1 -0.5 0.1; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate">
			</a-gltf-model>
		</a-entity>
	</a-scene>
</body>

</html>
